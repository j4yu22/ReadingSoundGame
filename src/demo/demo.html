<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arthur Demo</title>
  <link rel="stylesheet" href="demo.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="arthur-mark" aria-hidden="true">A</div>
      <div>
        <h1>Arthur</h1>
        <p id="modeText">Ready</p>
      </div>
      <div class="round-meter" aria-label="Exercise progress">
        <span class="meter-dot is-current"></span>
        <span class="meter-dot"></span>
        <span class="meter-dot"></span>
      </div>
    </header>

    <section class="stage" aria-label="Token activity">
      <div id="wordOrb" class="word-orb" aria-label="Current word token"></div>

      <div id="tokenTrack" class="token-track" aria-label="Sound tokens"></div>

      <div id="dropZone" class="drop-zone" aria-label="Pull tokens here">
        <div id="acceptedTokens" class="accepted-tokens"></div>
      </div>
    </section>

    <section class="controls" aria-label="Activity controls">
      <button id="startBtn" type="button" class="primary-action">Start</button>
      <button id="replayBtn" type="button">Replay</button>
      <button id="resetBtn" type="button">Reset</button>
    </section>

    <details class="dev-panel">
      <summary>Dev</summary>
      <dl>
        <div>
          <dt>Arthur</dt>
          <dd id="arthurLine">...</dd>
        </div>
        <div>
          <dt>Heard</dt>
          <dd id="heardLine">...</dd>
        </div>
        <div>
          <dt>Expected</dt>
          <dd id="expectedLine">...</dd>
        </div>
      </dl>
    </details>
  </main>

  <script type="module" src="demo.js"></script>
</body>
</html>
